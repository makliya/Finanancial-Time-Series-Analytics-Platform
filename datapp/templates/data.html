{% extends 'layout.html' %}
{% load static %}
{% block content %}

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>
  .container {
    max-width: 900px;
    margin: 0 auto;
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    margin-top: 150px;
  }
  h1 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
  }
  .form-group {
    margin-bottom: 15px;
  }
  label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
    color: #333;
  }
  input[type="text"] {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    box-sizing: border-box;
  }
  .hint {
    font-size: 13px;
    color: #666;
    margin-top: 6px;
  }
  button {
    background-color: #4CAF50;
    color: white;
    padding: 12px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    width: 100%;
    margin-top: 10px;
  }
  button:hover {
    background-color: #45a049;
  }
</style>

<div class="container">
  <h1>Data Collection</h1>

  <form id="dataForm" method="POST" action="{% url 'data' %}">
    {% csrf_token %}

    <div class="form-group">
      <label for="code">Stock code</label>
      <input
        id="code"
        type="text"
        class="form-control"
        name="code"
        placeholder="e.g. SH000001 / SZ000001 / HK00700"
        required
      >
      <div class="hint">Enter a valid stock symbol used by the data source.</div>
    </div>

    <div class="form-group">
      <label for="start">Start datetime</label>
      <input
        id="start"
        type="text"
        class="form-control"
        name="start"
        placeholder="YYYY-MM-DD HH:MM:SS   e.g. 2020-04-02 00:00:00"
        required
      >
      <div class="hint">Format must be: <b>YYYY-MM-DD HH:MM:SS</b></div>
    </div>

    <div class="form-group">
      <label for="end">End datetime</label>
      <input
        id="end"
        type="text"
        class="form-control"
        name="end"
        placeholder="YYYY-MM-DD HH:MM:SS   e.g. 2020-04-10 00:00:00"
        required
      >
      <div class="hint">Format must be: <b>YYYY-MM-DD HH:MM:SS</b></div>
    </div>

    <button type="submit">Start collecting</button>
  </form>
</div>

{% if msg %}
<script>
  alert("{{ msg }}");
</script>
{% endif %}

{% endblock %}
