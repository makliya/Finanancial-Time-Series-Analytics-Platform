<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock Dashboard</title>

  <link rel="stylesheet" href="/static/bootstrap-3.4.1/dist/css/bootstrap.css">
</head>

<body>
  <nav class="navbar navbar-default" style="border-radius:0;margin-bottom:-30px;background-color: rgb(227, 43, 46);">
    <div class="container-fluid">

      <div class="navbar-header">
        <button type="button" class="navbar-toggle collapsed" data-toggle="collapse"
          data-target="#bs-example-navbar-collapse-1" aria-expanded="false">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>

        <a class="navbar-brand" href="/home/" style="color: white;font-weight: bold;">
          <img
            src="/static/logo.png"
            style="height:3.5rem; width:3.5rem; margin-top:-10px;"
            alt="Logo"
          />
        </a>
      </div>

      <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
        <ul class="nav navbar-nav">

          <li class="dropdown">
            <a href="/home/" class="dropdown-toggle" style="color:white;font-weight:bold;">Home</a>
          </li>

          <li class="dropdown">
            <a href="/gpfx/" class="dropdown-toggle" style="color:white;font-weight:bold;">Stock Analysis</a>
          </li>

          <li class="dropdown">
            <a href="/data/" class="dropdown-toggle" style="color:white;font-weight:bold;">Data Collection</a>
          </li>

        </ul>

        <ul class="nav navbar-nav navbar-right">
          <li class="dropdown">
            <a href="#" data-toggle="dropdown" role="button" aria-haspopup="true" aria-expanded="false" style="color:white;">
              {{ request.info_dict.name }} <span class="caret"></span>
            </a>

            <ul class="dropdown-menu">
              <li role="separator" class="divider"></li>
              <li><a href="/logout/">Sign out</a></li>
            </ul>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <div>
    {% block content %}
    {% endblock %}
  </div>

  <script src="/static/jquery-3.6.0.min.js"></script>
  <script src="/static/bootstrap-3.4.1/dist/js/bootstrap.min.js"></script>
</body>
</html>
